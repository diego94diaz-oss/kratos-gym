<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07080c" />
  <title>Kratos Gym</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <div id="auth-view" class="auth-view hidden">
    <div class="auth-card">
      <div class="brand"><span class="brand-mark">⚔️</span><h1>Kratos Gym</h1></div>
      <p class="muted">Tu entrenamiento, en cualquier dispositivo.</p>
      <form id="auth-form">
        <input id="auth-email" type="email" placeholder="Email" autocomplete="email" required />
        <input id="auth-pass" type="password" placeholder="Contraseña" autocomplete="current-password" required />
        <button id="auth-submit" type="submit" class="btn btn-primary">Entrar</button>
      </form>
      <button id="auth-toggle" class="btn-link">¿Primera vez? Crear cuenta</button>
      <p id="auth-msg" class="auth-msg"></p>
    </div>
  </div>

  <!-- ===== CONFIG MISSING ===== -->
  <div id="config-view" class="auth-view hidden">
    <div class="auth-card">
      <div class="brand"><span class="brand-mark">⚙️</span><h1>Falta configurar</h1></div>
      <p class="muted">Edita <code>js/config.js</code> con tu URL y anon key de Supabase.</p>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app-view" class="app-view hidden">
    <header class="topbar">
      <div class="topbar-brand"><span>⚔️</span> Kratos Gym</div>
      <button id="theme-btn" class="icon-btn" title="Tema">🌙</button>
    </header>

    <main id="main" class="main"></main>

    <nav class="tabbar">
      <button class="tab" data-tab="hoy">🏋️<span>Hoy</span></button>
      <button class="tab" data-tab="rutina">📋<span>Rutina</span></button>
      <button class="tab" data-tab="avances">📈<span>Avances</span></button>
      <button class="tab" data-tab="peso">⚖️<span>Peso</span></button>
      <button class="tab" data-tab="ajustes">⚙️<span>Ajustes</span></button>
    </nav>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Libs -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <!-- App -->
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
